<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập - Hành Trang Hôn Nhân</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-container fade-in">
      <div class="auth-box">
        <h2>ĐĂNG NHẬP</h2>
        <div class="form-group">
          <label for="l_contact">Tài khoản (Email/SĐT)</label>
          <input type="text" id="l_contact" title="Tài khoản" placeholder="Nhập email hoặc số điện thoại" />
        </div>
        <div class="form-group">
          <label for="l_pass">Mật khẩu</label>
          <input type="password" id="l_pass" title="Mật khẩu" placeholder="Nhập mật khẩu" />
        </div>
        <button
          class="btn btn-primary"
          style="width: 100%; margin-top: 10px"
          onclick="doLogin()">
          VÀO HỆ THỐNG
        </button>
        <div class="auth-link" style="margin-top: 20px">
          Chưa có tài khoản?
          <a
            href="register.html"
            style="
              color: var(--accent-purple);
              font-weight: 800;
              text-decoration: none;
            "
            >Đăng ký ngay</a
          >
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="auth.js"></script>
  </body>
</html>
