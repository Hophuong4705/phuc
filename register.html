<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký - Hành Trang Hôn Nhân</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-container fade-in">
      <div class="auth-box">
        <h2>TẠO TÀI KHOẢN</h2>
        <div class="form-group">
          <label for="r_name">Họ và Tên</label>
          <input type="text" id="r_name" placeholder="Nhập họ và tên" />
        </div>
        <div class="form-group">
          <label for="r_contact">Email / SĐT</label>
          <input
            type="text"
            id="r_contact"
            placeholder="Nhập email hoặc số điện thoại" />
        </div>
        <div class="form-group">
          <label for="r_pass">Mật khẩu</label>
          <input type="password" id="r_pass" placeholder="Nhập mật khẩu" />
        </div>
        <button
          class="btn btn-primary"
          style="width: 100%; margin-top: 10px"
          onclick="doRegister()">
          HOÀN TẤT
        </button>
        <div class="auth-link" style="margin-top: 20px">
          Đã có tài khoản?
          <a
            href="login.html"
            style="
              color: var(--accent-purple);
              font-weight: 800;
              text-decoration: none;
            "
            >Đăng nhập</a
          >
        </div>
      </div>
    </div>
    <div class="toast" id="toast"></div>

    <script src="auth.js"></script>
  </body>
</html>
