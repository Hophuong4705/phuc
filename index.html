<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tình Yêu · Lựa Chọn · Hậu Quả</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #faf8f4;
        --surface: #fff;
        --surface2: #f5f2ec;
        --text: #1a1714;
        --text2: #6b6460;
        --text3: #a09890;
        --accent: #c4703a;
        --accent2: #8b4513;
        --accent-light: #fdf0e8;
        --border: #e8e0d5;
        --border2: #d4c9bc;
        --trust: #4a8c6e;
        --conflict: #c4503a;
        --comm: #3a6c8c;
        --emotion: #8c5a3a;
        --radius: 12px;
        --radius-lg: 20px;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 0;
      }
      h1,
      h2,
      h3 {
        font-family: "Playfair Display", serif;
      }

      #app {
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1rem;
      }

      .header {
        text-align: center;
        margin-bottom: 2.5rem;
      }
      .header h1 {
        font-size: 2rem;
        color: var(--text);
        margin-bottom: 0.5rem;
        letter-spacing: -0.5px;
      }
      .header p {
        color: var(--text2);
        font-size: 0.95rem;
        line-height: 1.6;
      }
      .header .tagline {
        display: inline-block;
        background: var(--accent-light);
        color: var(--accent2);
        font-size: 0.8rem;
        padding: 0.3rem 0.8rem;
        border-radius: 20px;
        margin-bottom: 0.8rem;
        font-weight: 500;
      }

      .scenario-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.75rem;
        margin-bottom: 1.5rem;
        position: relative;
        overflow: hidden;
      }
      .scenario-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
      }
      .scenario-num {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text3);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      .scenario-title {
        font-size: 1.3rem;
        color: var(--text);
        margin-bottom: 0.8rem;
      }
      .scenario-desc {
        color: var(--text2);
        font-size: 0.9rem;
        line-height: 1.6;
        background: var(--surface2);
        padding: 1rem;
        border-radius: var(--radius);
        border-left: 3px solid var(--accent);
      }

      .depth-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin: 1.25rem 0 0.75rem;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text3);
      }
      .depth-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      .choices-list {
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
      }
      .choice-btn {
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: var(--radius);
        padding: 1rem 1.2rem;
        cursor: pointer;
        text-align: left;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
        width: 100%;
      }
      .choice-btn:hover {
        border-color: var(--accent);
        background: var(--accent-light);
        transform: translateX(4px);
      }
      .choice-btn .choice-id {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--accent);
        letter-spacing: 0.5px;
        margin-bottom: 0.3rem;
      }
      .choice-btn .choice-text {
        font-size: 0.9rem;
        color: var(--text);
        line-height: 1.4;
      }
      .choice-btn .choice-effect {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.5rem;
        flex-wrap: wrap;
      }
      .effect-tag {
        font-size: 0.7rem;
        padding: 0.15rem 0.5rem;
        border-radius: 10px;
        font-weight: 500;
      }
      .effect-trust {
        background: #e8f5ef;
        color: var(--trust);
      }
      .effect-conflict {
        background: #fde8e8;
        color: var(--conflict);
      }
      .effect-comm {
        background: #e8eff5;
        color: var(--comm);
      }
      .effect-emotion {
        background: #f5ece8;
        color: var(--emotion);
      }

      .result-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.5rem;
        margin-top: 1rem;
      }
      .result-card .r-short {
        font-size: 1rem;
        font-weight: 500;
        color: var(--text);
        margin-bottom: 0.4rem;
      }
      .result-card .r-long {
        font-size: 0.85rem;
        color: var(--text2);
        font-style: italic;
        border-left: 2px solid var(--accent);
        padding-left: 0.75rem;
        margin-top: 0.5rem;
      }

      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .bc-item {
        font-size: 0.75rem;
        color: var(--accent2);
        background: var(--accent-light);
        padding: 0.2rem 0.6rem;
        border-radius: 10px;
        font-weight: 500;
      }
      .bc-sep {
        color: var(--text3);
        font-size: 0.7rem;
      }

      .nav-btns {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.25rem;
        flex-wrap: wrap;
      }
      .btn {
        padding: 0.65rem 1.25rem;
        border-radius: 10px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 500;
        font-family: "DM Sans", sans-serif;
        border: 1px solid;
        transition: all 0.15s;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent2);
      }
      .btn-primary:hover {
        background: var(--accent2);
      }
      .btn-secondary {
        background: var(--surface);
        color: var(--text2);
        border-color: var(--border2);
      }
      .btn-secondary:hover {
        background: var(--surface2);
        color: var(--text);
      }

      .progress-bar {
        background: var(--border);
        border-radius: 10px;
        height: 5px;
        margin-bottom: 2rem;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 10px;
        transition: width 0.4s ease;
      }

      .scores-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
        margin-bottom: 1.5rem;
      }
      .scores-title {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text3);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 0.9rem;
      }
      .score-row {
        display: grid;
        grid-template-columns: 110px 1fr 36px;
        align-items: center;
        gap: 0.6rem;
        margin-bottom: 0.5rem;
      }
      .score-label {
        font-size: 0.8rem;
        color: var(--text2);
        font-weight: 500;
      }
      .score-track {
        background: var(--border);
        border-radius: 5px;
        height: 6px;
        overflow: hidden;
      }
      .score-bar {
        height: 100%;
        border-radius: 5px;
        transition: width 0.4s ease;
      }
      .score-val {
        font-size: 0.75rem;
        font-weight: 500;
        text-align: right;
      }
      .score-trust {
        background: var(--trust);
      }
      .score-conflict {
        background: var(--conflict);
      }
      .score-comm {
        background: var(--comm);
      }
      .score-emotion {
        background: var(--emotion);
      }
      .trust-val {
        color: var(--trust);
      }
      .conflict-val {
        color: var(--conflict);
      }
      .comm-val {
        color: var(--comm);
      }
      .emotion-val {
        color: var(--emotion);
      }

      .final-screen {
        padding: 1rem 0;
      }
      .result-type {
        display: inline-block;
        padding: 0.5rem 1.5rem;
        border-radius: 20px;
        font-size: 1rem;
        font-weight: 500;
        margin: 0.75rem 0 1.5rem;
        font-family: "Playfair Display", serif;
        font-style: italic;
      }
      .result-desc {
        color: var(--text2);
        line-height: 1.7;
        margin-bottom: 1.5rem;
        font-size: 0.92rem;
      }
      .traits-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin: 1.5rem 0;
        text-align: left;
      }
      .trait-item {
        background: var(--surface2);
        border-radius: var(--radius);
        padding: 0.9rem;
        border: 1px solid var(--border);
      }
      .trait-name {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text3);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 0.3rem;
      }
      .trait-val {
        font-size: 0.9rem;
        color: var(--text);
        font-weight: 500;
      }

      .section-divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1.5rem 0;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .fade-in {
        animation: fadeIn 0.3s ease forwards;
      }
    </style>
  </head>

      function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
      }

      let state = {
        phase: "start",
        scenarioIdx: 0,
        currentNode: null,
        scores: { trust: 0, conflict: 0, comm: 0, emotion: 0 },
        history: [],
        breadcrumb: [],
      };

      function applyEffect(effect) {
        if (!effect) return;
        for (const k in effect) {
          state.scores[k] = clamp((state.scores[k] || 0) + effect[k], -10, 10);
        }
      }

      function getScorePct(val) {
        return Math.round(((val + 10) / 20) * 100);
      }

        const { trust, conflict, comm, emotion } = state.scores;
        if (comm > 3 && conflict < 0)

          renderStart(app);
          return;

        if (state.phase === "playing") {
          renderPlaying(app);
          return;
        }
        if (state.phase === "result") {
          renderResult(app);
          return;

              <div class="score-track"><div class="score-bar score-${sc.cl}" style="width:${getScorePct(sc.v)}%"></div></div>

            </div>`,
            )
            .join("")}
        </div>
        <button class="btn btn-primary" style="width:100%;padding:.85rem;font-size:.95rem;margin-top:.5rem" onclick="resetGame()">Chơi lại từ đầu</button>

      function startGame() {
        state = {
          phase: "playing",
          scenarioIdx: 0,
          currentNode: null,
          scores: { trust: 0, conflict: 0, comm: 0, emotion: 0 },
          history: [],
          breadcrumb: [],
        };
        render();
      }

      function chooseOption(choice) {
        applyEffect(choice.effect);
        state.breadcrumb.push(choice.id);
        state.history.push({ path: choice.id, text: choice.text });
        if (choice.result) {
          state.currentNode = { result: choice.result };
        } else if (choice.next) {
          state.currentNode = choice.next;
        }
        render();
      }

      function nextScenario() {
        state.scenarioIdx++;
        state.currentNode = null;
        state.breadcrumb = [];
        render();
      }

      function backToScenario() {
        state.currentNode = null;
        state.breadcrumb = [];
        render();
      }

      function showResult() {
        state.phase = "result";
        render();
      }

      function resetGame() {
