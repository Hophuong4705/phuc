<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tình Yêu · Lựa Chọn · Hậu Quả</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:ital,wght@1,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#f8f0ff;
  --white:#ffffff;
  --card:#ffffff;

  --purple:#8b5cf6;
  --purple-dark:#6d28d9;
  --purple-light:#ede9fe;
  --purple-mid:#c4b5fd;

  --pink:#ec4899;
  --pink-dark:#be185d;
  --pink-light:#fce7f3;
  --pink-mid:#f9a8d4;

  --cyan:#06b6d4;
  --cyan-light:#cffafe;
  --cyan-mid:#67e8f9;

  --green:#10b981;
  --green-light:#d1fae5;
  --green-mid:#6ee7b7;

  --orange:#f59e0b;
  --orange-light:#fef3c7;
  --orange-mid:#fcd34d;

  --red:#ef4444;
  --red-light:#fee2e2;
  --red-mid:#fca5a5;

  --text:#1e1b4b;
  --text2:#4c1d95;
  --text3:#a78bfa;

  --shadow: 0 4px 24px rgba(139,92,246,.13);
  --shadow-lg: 0 8px 40px rgba(139,92,246,.18);

  --r:14px;
  --r-lg:22px;
  --r-xl:32px;
}

body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  color:var(--text);
  background-image:
    radial-gradient(circle at 15% 15%, #ede9fe 0%, transparent 45%),
    radial-gradient(circle at 85% 80%, #fce7f3 0%, transparent 45%),
    radial-gradient(circle at 50% 50%, #f0fdf4 0%, transparent 60%);
}

#app{max-width:720px;margin:0 auto;padding:2rem 1.1rem 5rem}

/* ─── START SCREEN ─── */
.hero{text-align:center;padding:2.5rem 0 2rem}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;font-size:.78rem;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;padding:.45rem 1.2rem;border-radius:50px;
  margin-bottom:1.4rem;box-shadow:0 4px 16px rgba(236,72,153,.35);
}
.hero h1{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:3rem;line-height:1.1;margin-bottom:.9rem;
  background:linear-gradient(135deg,var(--purple-dark) 0%,var(--pink) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero p{color:#6d28d9;font-size:.97rem;line-height:1.75;font-weight:600;max-width:480px;margin:0 auto}

.start-card{
  background:var(--white);border-radius:var(--r-xl);
  padding:2rem;box-shadow:var(--shadow-lg);
  border:2px solid var(--purple-mid);
}

.stats-row{
  display:grid;grid-template-columns:repeat(4,1fr);gap:.65rem;margin-bottom:1.5rem;
}
.stat-box{
  background:linear-gradient(135deg,var(--purple-light),var(--pink-light));
  border-radius:var(--r);padding:.9rem .5rem;text-align:center;
  border:2px solid var(--purple-mid);
}
.stat-n{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:1.9rem;font-weight:700;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;margin-bottom:.2rem;
}
.stat-l{font-size:.7rem;color:var(--purple);font-weight:700;letter-spacing:.3px}

.indicators{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1.6rem}
.ind-chip{
  display:flex;align-items:center;gap:.55rem;
  padding:.65rem .9rem;border-radius:50px;font-size:.82rem;font-weight:700;
  border:2px solid;
}

.btn-main{
  width:100%;padding:1.05rem;border:none;border-radius:50px;
  background:linear-gradient(135deg,var(--purple) 0%,var(--pink) 100%);
  color:#fff;font-family:'Nunito',sans-serif;font-size:1.05rem;font-weight:800;
  cursor:pointer;letter-spacing:.3px;
  box-shadow:0 6px 24px rgba(139,92,246,.4);
  transition:transform .15s,box-shadow .15s;
}
.btn-main:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(139,92,246,.5)}
.btn-main:active{transform:translateY(0)}

/* ─── PROGRESS ─── */
.progress-wrap{margin-bottom:1.8rem}
.progress-meta{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.55rem;
}
.progress-label{
  font-size:.78rem;font-weight:800;color:var(--purple);letter-spacing:.8px;text-transform:uppercase;
}
.progress-frac{
  background:var(--purple-light);color:var(--purple-dark);
  font-size:.78rem;font-weight:800;padding:.2rem .65rem;border-radius:20px;
}
.progress-track{background:#e9d5ff;border-radius:50px;height:10px;overflow:hidden}
.progress-fill{
  height:100%;border-radius:50px;
  background:linear-gradient(90deg,var(--purple),var(--pink));
  transition:width .5s cubic-bezier(.4,0,.2,1);
}

/* ─── SCORES PANEL ─── */
.scores-panel{
  background:var(--white);border-radius:var(--r-lg);
  padding:1.4rem 1.5rem;margin-bottom:1.4rem;
  box-shadow:var(--shadow);border:2px solid var(--purple-light);
}
.scores-title{
  font-size:.72rem;font-weight:800;color:var(--text3);
  letter-spacing:1.2px;text-transform:uppercase;margin-bottom:1rem;
}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.score-box{
  background:var(--bg);border-radius:var(--r);
  padding:.75rem .9rem;border:2px solid;
}
.score-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem}
.score-name{font-size:.78rem;font-weight:800}
.score-num{font-size:.88rem;font-weight:900}
.score-bar-wrap{background:rgba(255,255,255,.7);border-radius:50px;height:7px;overflow:hidden}
.score-bar-inner{height:100%;border-radius:50px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ─── SCENARIO CARD ─── */
.scene-card{
  background:var(--white);border-radius:var(--r-lg);
  overflow:hidden;margin-bottom:1.4rem;
  box-shadow:var(--shadow);
  border:2px solid var(--purple-light);
}
.scene-top{
  padding:1.4rem 1.6rem 1.2rem;
  background:linear-gradient(135deg,var(--purple-light) 0%,var(--pink-light) 100%);
  border-bottom:2px solid var(--purple-mid);
  display:flex;align-items:center;gap:1rem;
}
.scene-emoji{
  width:56px;height:56px;min-width:56px;
  background:var(--white);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;
  font-size:1.7rem;box-shadow:0 2px 12px rgba(139,92,246,.2);
  border:2px solid var(--purple-mid);
}
.scene-num{
  font-size:.7rem;font-weight:800;letter-spacing:1.2px;
  text-transform:uppercase;color:var(--purple);margin-bottom:.3rem;
}
.scene-title{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:1.3rem;color:var(--text);line-height:1.2;
}
.scene-body{padding:1.2rem 1.6rem}
.scene-desc{
  font-size:.9rem;color:#4c1d95;line-height:1.75;font-weight:600;
  background:var(--purple-light);
  padding:.9rem 1.1rem;border-radius:var(--r);
  border-left:4px solid var(--purple);
}

/* ─── BREADCRUMB ─── */
.breadcrumb{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem}
.bc-item{
  font-size:.74rem;color:#fff;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  padding:.25rem .7rem;border-radius:20px;font-weight:800;
  box-shadow:0 2px 8px rgba(139,92,246,.3);
}
.bc-sep{color:var(--text3);font-size:.8rem}

/* ─── QUESTION LABEL ─── */
.q-label{
  text-align:center;font-size:.82rem;font-weight:800;color:var(--purple);
  letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:1rem;
  display:flex;align-items:center;gap:.6rem;
}
.q-label::before,.q-label::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,transparent,var(--purple-mid))}
.q-label::after{background:linear-gradient(90deg,var(--purple-mid),transparent)}

/* ─── CHOICE BUTTONS ─── */
.choices-list{display:flex;flex-direction:column;gap:.85rem}
.choice-btn{
  background:var(--white);
  border:2px solid var(--purple-mid);
  border-radius:var(--r-lg);
  padding:1.1rem 1.3rem;
  cursor:pointer;text-align:left;width:100%;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;gap:.6rem;
}
.choice-btn:hover{
  border-color:var(--purple);
  background:linear-gradient(135deg,var(--purple-light) 0%,var(--pink-light) 100%);
  transform:translateY(-3px) scale(1.01);
  box-shadow:0 8px 28px rgba(139,92,246,.22);
}
.choice-btn:active{transform:translateY(-1px) scale(1)}

.choice-row{display:flex;align-items:flex-start;gap:.85rem}
.choice-id{
  min-width:36px;height:36px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;font-size:.88rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 10px rgba(139,92,246,.35);
  flex-shrink:0;
}
.choice-text{
  font-size:.94rem;color:var(--text);font-weight:700;
  line-height:1.5;padding-top:.1rem;
}
.etags{display:flex;flex-wrap:wrap;gap:.4rem;padding-left:0}
.etag{
  font-size:.71rem;font-weight:800;
  padding:.22rem .65rem;border-radius:50px;border:2px solid;
}
.et-trust  {background:var(--green-light);color:#065f46;border-color:var(--green-mid)}
.et-conflict{background:var(--red-light);color:#991b1b;border-color:var(--red-mid)}
.et-comm   {background:var(--cyan-light);color:#164e63;border-color:var(--cyan-mid)}
.et-emotion{background:var(--orange-light);color:#92400e;border-color:var(--orange-mid)}

/* ─── CONSEQUENCE ─── */
.consequence{
  margin-top:1.1rem;
  background:linear-gradient(135deg,#fdf4ff 0%,#fce7f3 100%);
  border:2px solid var(--pink-mid);
  border-radius:var(--r-lg);
  padding:1.4rem 1.6rem;
}
.cons-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,var(--pink),var(--purple));
  color:#fff;font-size:.7rem;font-weight:800;
  padding:.3rem .9rem;border-radius:50px;letter-spacing:.8px;
  text-transform:uppercase;margin-bottom:.85rem;
  box-shadow:0 3px 12px rgba(236,72,153,.3);
}
.cons-short{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:1.2rem;color:var(--text);margin-bottom:.7rem;line-height:1.3;
}
.cons-long{
  font-size:.88rem;color:#4c1d95;font-weight:600;line-height:1.75;
  background:rgba(255,255,255,.8);
  padding:.85rem 1.05rem;border-radius:var(--r);
  border-left:4px solid var(--pink);
}

/* ─── NAV BUTTONS ─── */
.nav-btns{display:flex;gap:.75rem;margin-top:1.2rem;flex-wrap:wrap}
.btn-next{
  padding:.75rem 1.5rem;border:none;border-radius:50px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;
  cursor:pointer;box-shadow:0 4px 16px rgba(139,92,246,.35);
  transition:transform .15s,box-shadow .15s;
}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(139,92,246,.45)}
.btn-back{
  padding:.75rem 1.25rem;border-radius:50px;
  background:var(--white);color:var(--purple);
  font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:800;
  cursor:pointer;border:2px solid var(--purple-mid);
  transition:all .15s;
}
.btn-back:hover{background:var(--purple-light);border-color:var(--purple)}

/* ─── RESULT SCREEN ─── */
.result-card{
  background:var(--white);border-radius:var(--r-xl);
  padding:2rem;box-shadow:var(--shadow-lg);
  border:2px solid var(--purple-mid);
}
.result-header{text-align:center;margin-bottom:1.5rem}
.result-icon{
  font-size:3.5rem;margin-bottom:.6rem;
  filter:drop-shadow(0 4px 12px rgba(139,92,246,.3));
}
.result-type{
  display:inline-block;padding:.4rem 1.3rem;border-radius:50px;
  font-size:.82rem;font-weight:800;letter-spacing:.5px;margin-bottom:1rem;
  border:2px solid;
}
.result-name{
  font-family:'Fraunces',serif;font-style:italic;
  font-size:1.9rem;color:var(--text);margin-bottom:.5rem;line-height:1.2;
}
.result-desc{
  font-size:.9rem;color:#4c1d95;font-weight:600;line-height:1.75;
  background:var(--purple-light);
  padding:1rem 1.2rem;border-radius:var(--r);
  border-left:4px solid var(--purple);
  margin-bottom:1.4rem;text-align:left;
}
.traits-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;margin-bottom:1.4rem}
.trait-box{
  background:linear-gradient(135deg,var(--purple-light),var(--pink-light));
  border-radius:var(--r);padding:.85rem .8rem;
  border:2px solid var(--purple-mid);text-align:center;
}
.trait-emoji{font-size:1.3rem;margin-bottom:.35rem}
.trait-text{font-size:.78rem;color:var(--text);font-weight:700;line-height:1.35}

.divider{border:none;border-top:2px solid var(--purple-light);margin:1.4rem 0}
.final-scores-title{font-size:.72rem;font-weight:800;color:var(--text3);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:1rem}
.final-score-row{
  display:flex;align-items:center;gap:.75rem;margin-bottom:.7rem;
}
.fsr-label{font-size:.82rem;font-weight:800;color:var(--text);min-width:130px}
.fsr-track{flex:1;background:#ede9fe;border-radius:50px;height:10px;overflow:hidden}
.fsr-bar{height:100%;border-radius:50px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.fsr-val{font-size:.82rem;font-weight:900;min-width:36px;text-align:right}

/* ─── ANIMATION ─── */
@keyframes popUp{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.fade-in{animation:popUp .35s cubic-bezier(.4,0,.2,1) forwards}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SCENARIOS=[
  {id:"s1",title:"Nghi ngờ ngoại tình",icon:"🧠",
   desc:"Dạo gần đây bạn thấy người yêu hay giấu điện thoại, nhắn tin lúc khuya rồi quay lưng lại. Cảm giác \"có gì đó không ổn\" cứ ám ảnh bạn mỗi ngày.",
   choices:[
    {id:"A",text:"Hỏi thẳng luôn cho rõ",effect:{trust:-1,conflict:2,comm:-1,emotion:-2},
     next:{id:"A",desc:"Họ bất ngờ, hơi phòng thủ",choices:[
      {id:"A1",text:"Hỏi dồn dập, không cho họ giải thích",effect:{trust:-2,conflict:3,emotion:-2},
       next:{id:"A1",desc:"Họ bắt đầu khó chịu",choices:[
        {id:"A1a",text:"Họ cáu và phản công lại",effect:{trust:-2,conflict:2},result:{short:"Hai người cãi nhau rất lớn",long:"Khoảng cách cảm xúc tăng dần — mất an toàn trong mối quan hệ là hậu quả kéo dài nhất."}},
        {id:"A1b",text:"Họ im lặng, bỏ đi không nói gì",effect:{trust:-3,conflict:1},result:{short:"Bạn hoang mang, nghi ngờ càng tăng",long:"Thiếu tin tưởng nghiêm trọng — mối quan hệ dễ rơi vào vòng xoáy nghi ngờ không hồi kết."}}
       ]}},
      {id:"A2",text:"Cố giữ bình tĩnh khi hỏi",effect:{trust:0,conflict:1,comm:1},
       next:{id:"A2",desc:"Họ bắt đầu giải thích",choices:[
        {id:"A2a",text:"Vẫn nghi ngờ, bắt đầu kiểm tra điện thoại",effect:{trust:-3,conflict:2,emotion:-2},result:{short:"Phát hiện thêm hoặc tự dằn vặt mình",long:"Dù có hay không có bằng chứng — hành động kiểm tra điện thoại thường làm tổn thương cả hai người."}},
        {id:"A2b",text:"Chọn tin tưởng và buông bỏ nghi ngờ",effect:{trust:2,conflict:-1,emotion:1},result:{short:"Nhẹ lòng — mối quan hệ có cơ hội hồi phục",long:"Niềm tin được trao — nếu lý do là thật, đây là nền tảng để cả hai gắn kết hơn từng ngày."}}
       ]}},
      {id:"A3",text:"Mất kiểm soát, nói những câu rất nặng",effect:{trust:-3,conflict:3,emotion:-3},result:{short:"Không khí cực kỳ căng, cả hai tổn thương",long:"Những câu nói trong lúc mất kiểm soát thường để lại vết thương lâu nhất — đôi khi không lành được."}}
     ]}},
    {id:"B",text:"Chọn lúc phù hợp, nói chuyện nhẹ nhàng",effect:{trust:1,conflict:-1,comm:2,emotion:1},
     next:{id:"B",desc:"Họ có vẻ cởi mở hơn",choices:[
      {id:"B1",text:"Họ thừa nhận có vấn đề thật",effect:{trust:0,conflict:1,comm:3},
       next:{id:"B1",desc:"Bạn sốc nhưng biết sự thật",choices:[
        {id:"B1a",text:"Cùng đặt lại ranh giới, xây dựng lại niềm tin",effect:{trust:3,conflict:-2,comm:3},result:{short:"Mối quan hệ trưởng thành và bền vững hơn",long:"Đối diện sự thật và cùng nhau vượt qua — đây là dấu hiệu của tình yêu thật sự trưởng thành."}},
        {id:"B1b",text:"Không vượt qua được, chia tay nhẹ nhàng",effect:{trust:1,conflict:-1,comm:2},result:{short:"Ít tổn thương hơn cách chia tay thông thường",long:"Kết thúc trong tôn trọng là điều không phải ai cũng làm được — đó là sự dũng cảm."}}
       ]}},
      {id:"B2",text:"Họ phủ nhận và chối thẳng",effect:{trust:-2,conflict:1},result:{short:"Bạn hoang mang hơn trước khi hỏi",long:"Khi câu trả lời không thỏa đáng, hãy tin vào cảm xúc của mình và tiếp tục quan sát thêm."}},
      {id:"B3",text:"Họ né tránh, câu chuyện bị bỏ lửng",effect:{trust:-1,conflict:1,comm:-1},result:{short:"Vấn đề treo lơ lửng, không được giải quyết",long:"Né tránh chỉ trì hoãn — không giải quyết. Hãy tìm lúc khác phù hợp hơn để tiếp tục."}}
     ]}},
    {id:"C",text:"Im lặng, tự quan sát thêm",effect:{trust:0,conflict:0,comm:-2,emotion:-2},
     next:{id:"C",desc:"Bạn suy nghĩ quá nhiều mỗi ngày",choices:[
      {id:"C1",text:"Thấy thêm dấu hiệu → bùng nổ mạnh hơn",effect:{trust:-3,conflict:3,emotion:-3},result:{short:"Cảm xúc dồn nén → xung đột cực lớn",long:"Càng chờ, cảm xúc càng tích tụ và dễ gây ra những điều khó kiểm soát về sau."}},
      {id:"C2",text:"Không có gì rõ, bắt đầu tự nghi ngờ bản thân",effect:{trust:-1,emotion:-3},result:{short:"Lo âu kéo dài, mất tự tin vào mình",long:"Nghi ngờ chính cảm nhận của bản thân — đây là dấu hiệu bạn đang cần một cuộc trò chuyện thật sự."}},
      {id:"C3",text:"Tưởng tượng nhiều thứ, kiệt sức",effect:{trust:-2,conflict:1,emotion:-3},result:{short:"Mệt mỏi từ bên trong, không ngủ được",long:"Tâm trí bạn đang làm việc quá tải — hãy cho bản thân một cuộc trò chuyện thật, dù sợ."}}
     ]}}
   ]},
  {id:"s2",title:"Mâu thuẫn tiền bạc",icon:"💰",

    {id:"A",text:"Nói thẳng: bỏ điện thoại xuống đi",effect:{trust:-1,conflict:1,comm:0,emotion:-1},
     next:{id:"A",desc:"Họ hơi khó chịu với yêu cầu",choices:[
      {id:"A1",text:"Họ cãi lại, tranh luận về chuyện điện thoại",effect:{trust:-1,conflict:2,emotion:-1},result:{short:"Tranh cãi về triệu chứng, bỏ qua gốc rễ",long:"Điện thoại là biểu hiện — vấn đề thật có thể là cả hai đã hết chủ đề để nói chuyện với nhau."}},
      {id:"A2",text:"Họ làm theo nhưng miễn cưỡng rõ ràng",effect:{trust:0,conflict:1},result:{short:"Buổi ăn trở nên gượng gạo, không thoải mái",long:"Ép buộc sự hiện diện không tạo ra kết nối thật sự — cần cả hai thực sự muốn ở bên nhau."}},
      {id:"A3",text:"Họ cất điện thoại và hai người trò chuyện vui",effect:{trust:1,conflict:-1,comm:2},result:{short:"Kết nối được khôi phục ngay lập tức",long:"Đôi khi chỉ cần một lần nhắc nhở nhẹ nhàng đúng lúc là đủ để mọi thứ thay đổi tốt lên."}}
     ]}},
    {id:"B",text:"Góp ý nhẹ nhàng, chia sẻ cảm xúc thật",effect:{trust:1,conflict:-1,comm:2,emotion:1},result:{short:"Họ nhận ra và dần thay đổi tích cực",long:"Nói về cảm xúc ('muốn được trò chuyện') hiệu quả hơn nhiều so với phán xét ('cứ cắm điện thoại')."}},
    {id:"C",text:"Không nói gì, tự ngồi buồn một mình",effect:{trust:-1,comm:-2,emotion:-2},result:{short:"Cảm thấy bị bỏ rơi, xa nhau dần",long:"Im lặng và chịu đựng là cách yêu bản thân ít nhất — bạn xứng đáng được hiện diện thật sự."}}
   ]},
  {id:"s9",title:"Cảm giác hết yêu",icon:"💔",
   desc:"Bạn bắt đầu thấy tình cảm không còn như trước. Những cảm xúc quen thuộc dần phai nhạt — và bạn không còn chắc mình còn yêu nữa hay không.",
   choices:[
    {id:"A",text:"Chia tay luôn, không muốn kéo dài",effect:{trust:0,conflict:-1},
     next:{id:"A",desc:"Quyết định rõ ràng đã được đưa ra",choices:[
      {id:"A1",text:"Bạn cảm thấy nhẹ nhõm sau đó",effect:{trust:1,conflict:-2,emotion:2},result:{short:"Quyết định đúng đắn cho bản thân bạn",long:"Đôi khi dứt khoát là hành động tử tế nhất cho cả hai — sống thật với cảm xúc là điều dũng cảm."}},
      {id:"A2",text:"Bạn bắt đầu hối hận và tiếc nuối",effect:{trust:-1,emotion:-2},result:{short:"Hối hận vì quyết định có thể quá vội vàng",long:"Cảm giác 'hết yêu' đôi khi chỉ là kiệt sức — không phải kết thúc. Đáng được suy nghĩ kỹ hơn."}},
      {id:"A3",text:"Cả hai tổn thương nhưng hiểu nhau hơn",effect:{trust:1,conflict:-1,comm:2},result:{short:"Kết thúc trong tôn trọng và hiểu biết",long:"Chia tay trong hiểu biết là điều hiếm có — nó cho phép cả hai tiếp tục không mang theo vết thương."}}
     ]}},
    {id:"B",text:"Thử cứu vãn trước khi đưa ra quyết định",effect:{trust:1,comm:2,emotion:1},
     next:{id:"B",desc:"Mối quan hệ có cơ hội được hồi sinh",choices:[
      {id:"B1",text:"Tình cảm dần quay trở lại",effect:{trust:3,conflict:-2,comm:2,emotion:3},result:{short:"Mối quan hệ được hồi sinh mạnh mẽ",long:"Tình yêu có thể mờ dần rồi bùng lên lại — nếu cả hai cùng chọn nhau và nỗ lực cùng nhau."}},
      {id:"B2",text:"Nhận ra hai người thật sự không hợp",effect:{trust:1,conflict:-1,comm:1},result:{short:"Chia tay trong hiểu biết sâu sắc hơn",long:"Cố gắng hết sức rồi quyết định — không phải thất bại, mà là sự trưởng thành đáng trân trọng."}},
      {id:"B3",text:"Bạn trưởng thành hơn qua quá trình này",effect:{trust:1,comm:2,emotion:1},result:{short:"Bài học quý giá về bản thân và tình yêu",long:"Dù kết quả thế nào, việc cố gắng thật sự dạy bạn rất nhiều điều về chính mình."}}
     ]}},
    {id:"C",text:"Cứ để vậy, không muốn quyết định gì",effect:{trust:-1,comm:-1,emotion:-2},result:{short:"Mệt mỏi kéo dài, tổn thương âm ỉ",long:"Ở lại mà không có lý do để ở lại — là hình thức giam cầm cả hai trong sự trì trệ không lối thoát."}}
   ]},
  {id:"s10",title:"Bị gia đình thúc cưới",icon:"🧾",
   desc:"Gia đình bắt đầu giục cưới liên tục, nhưng bạn chưa thấy bản thân sẵn sàng. Áp lực từ nhiều phía đang ngày càng tăng lên.",
   choices:[
    {id:"A",text:"Cưới luôn cho xong, chiều ý mọi người",effect:{trust:-1,comm:-2,emotion:-2},result:{short:"Nhanh nhưng rủi ro về lâu dài rất cao",long:"Hôn nhân vì áp lực không phải nền tảng hạnh phúc — mâu thuẫn sau đám cưới thường nặng hơn rất nhiều."}},
    {id:"B",text:"Nói rõ ràng: mình cần thêm thời gian",effect:{trust:2,conflict:-1,comm:3,emotion:2},
     next:{id:"B",desc:"Quyết định trưởng thành và dũng cảm",choices:[
      {id:"B1",text:"Dành thời gian chuẩn bị kỹ càng hơn",effect:{trust:2,conflict:-1,comm:2},result:{short:"Vào hôn nhân với sự sẵn sàng thật sự",long:"Thời gian chuẩn bị không phải trì hoãn — mà là tôn trọng quyết định quan trọng nhất cuộc đời."}},
      {id:"B2",text:"Hai người hiểu nhau sâu hơn trong giai đoạn đó",effect:{trust:3,conflict:-1,comm:3},result:{short:"Mối quan hệ vững chắc hơn trước ngày cưới",long:"Biết nhau thật sự trước khi kết hôn là món quà tốt nhất bạn có thể dành cho hôn nhân của mình."}},
      {id:"B3",text:"Gia đình không đồng ý, tạo thêm áp lực",effect:{trust:1,conflict:1,comm:2},result:{short:"Giữ được giá trị bản thân dù rất khó",long:"Đứng vững trước áp lực gia đình cần hai người cùng đứng — đây là bài kiểm tra quan trọng nhất."}}
     ]}},
    {id:"C",text:"Từ chối thẳng, không muốn kết hôn lúc này",effect:{trust:0,conflict:1,comm:2},result:{short:"Rõ ràng và trung thực với chính mình",long:"Biết mình muốn gì và không muốn gì là sự trưởng thành — dù quyết định này dẫn đến thay đổi lớn."}}
   ]}
];

function clamp(v,a,b){return Math.min(b,Math.max(a,v))}
let state={phase:'start',si:0,node:null,scores:{trust:0,conflict:0,comm:0,emotion:0},bc:[]};
function fx(e){if(!e)return;for(const k in e)state.scores[k]=clamp((state.scores[k]||0)+e[k],-10,10)}
function pct(v){return Math.round((v+10)/20*100)}

function persona(){
  const {trust,conflict,comm,emotion}=state.scores;
  if(comm>3&&conflict<0) return{icon:"🌸",name:"Người giao tiếp lành mạnh",color:"#10b981",light:"#d1fae5",border:"#6ee7b7",
    desc:"Bạn có xu hướng xử lý xung đột bằng giao tiếp cởi mở và thẳng thắn. Đây là nền tảng vững chắc nhất cho bất kỳ mối quan hệ nào.",
    traits:[{e:"💬",t:"Giao tiếp cởi mở"},{e:"🧘",t:"Kiểm soát cảm xúc tốt"},{e:"🤝",t:"Xây dựng niềm tin qua hành động"}]};
  if(trust>3&&emotion>0) return{icon:"💙",name:"Người tin tưởng và cởi mở",color:"#3b82f6",light:"#dbeafe",border:"#93c5fd",
    desc:"Bạn có khả năng trao niềm tin cho người khác một cách tự nhiên. Đây là điểm mạnh quý giá — nhưng cũng cần có ranh giới rõ ràng để bảo vệ bản thân.",
    traits:[{e:"❤️",t:"Dễ kết nối cảm xúc"},{e:"🙏",t:"Sẵn lòng tha thứ"},{e:"🛡️",t:"Cần học cách bảo vệ mình"}]};
  if(conflict>3&&emotion<-2) return{icon:"🔥",name:"Người cảm xúc mãnh liệt",color:"#ef4444",light:"#fee2e2",border:"#fca5a5",
    desc:"Bạn phản ứng mạnh mẽ với cảm xúc và dễ bị cuốn vào xung đột. Sức mạnh cảm xúc là tài sản lớn — nếu được định hướng đúng cách.",
    traits:[{e:"🌊",t:"Cảm xúc sâu sắc"},{e:"💝",t:"Yêu hết mình"},{e:"🎯",t:"Cần học điều tiết cảm xúc"}]};
  if(comm<-2&&trust<-2) return{icon:"🌙",name:"Người né tránh xung đột",color:"#f59e0b",light:"#fef3c7",border:"#fcd34d",
    desc:"Bạn có xu hướng im lặng để giữ hòa khí. Điều này bảo vệ bạn trong ngắn hạn — nhưng cảm xúc tích tụ sẽ tìm cách thoát ra về lâu dài.",
    traits:[{e:"🕊️",t:"Tránh xung đột trực tiếp"},{e:"🌿",t:"Ưu tiên hòa khí"},{e:"🗣️",t:"Cần học nói ra cảm xúc"}]};
  return{icon:"⭐",name:"Người đang học cân bằng",color:"#8b5cf6",light:"#ede9fe",border:"#c4b5fd",
    desc:"Bạn đang trên hành trình học cách cân bằng giữa cảm xúc, giao tiếp và ranh giới cá nhân trong tình yêu. Đây là điều rất bình thường và đáng trân trọng.",
    traits:[{e:"📈",t:"Đang phát triển"},{e:"🧠",t:"Tự nhận thức tốt"},{e:"🚀",t:"Tiềm năng rất lớn"}]};
}

function etags(e){
  if(!e)return'';
  return[
    {k:'trust',l:'Niềm tin',c:'trust'},{k:'conflict',l:'Xung đột',c:'conflict'},
    {k:'comm',l:'Giao tiếp',c:'comm'},{k:'emotion',l:'Cảm xúc',c:'emotion'}
  ].filter(x=>e[x.k]).map(x=>`<span class="etag et-${x.c}">${x.l} ${e[x.k]>0?'+':''}${e[x.k]}</span>`).join('');
}

function render(){
  const app=document.getElementById('app');
  if(state.phase==='start')return void(app.innerHTML=startHTML());
  if(state.phase==='result')return void(app.innerHTML=resultHTML());
  app.innerHTML=playHTML();
}

function startHTML(){
  return`<div class="hero fade-in">
    <div class="hero-badge">✦ Game tâm lý tình yêu ✦</div>
    <h1>Tình yêu,<br>Lựa chọn<br>& Hậu quả</h1>
    <p>10 tình huống thực tế trong tình yêu.<br>Mỗi lựa chọn dẫn đến một chuỗi hậu quả riêng.</p>
  </div>
  <div class="start-card fade-in">
    <div class="stats-row">
      ${[{n:"10",l:"Tình huống"},{n:"4",l:"Chỉ số tâm lý"},{n:"4",l:"Tầng lựa chọn"},{n:"5",l:"Kết quả cuối"}].map(i=>`
        <div class="stat-box"><div class="stat-n">${i.n}</div><div class="stat-l">${i.l}</div></div>`).join('')}
    </div>
    <div class="indicators">
      ${[
        {bg:"#d1fae5",bd:"#6ee7b7",c:"#065f46",e:"💚",l:"Niềm tin"},
        {bg:"#fee2e2",bd:"#fca5a5",c:"#991b1b",e:"❤️",l:"Xung đột"},
        {bg:"#cffafe",bd:"#67e8f9",c:"#164e63",e:"💙",l:"Giao tiếp"},
        {bg:"#fef3c7",bd:"#fcd34d",c:"#92400e",e:"🧡",l:"Cảm xúc"}
      ].map(i=>`
        <div class="ind-chip" style="background:${i.bg};border-color:${i.bd};color:${i.c}">
          <span>${i.e}</span><span>${i.l}</span>
        </div>`).join('')}
    </div>
    <button class="btn-main" onclick="startGame()">Bắt đầu khám phá bản thân →</button>
  </div>`;
}

function playHTML(){
  const s=SCENARIOS[state.si];
  const node=state.node||s;
  const prog=Math.round(state.si/SCENARIOS.length*100);
  const isLeaf=!!node.result;
  const hasChoices=!!(node.choices&&node.choices.length);

  const scoreBoxes=[
    {k:'trust',l:'💚 Niềm tin',bar:'bar-trust',val:'val-trust',bg:'#d1fae5',bd:'#6ee7b7',tc:'#065f46'},
    {k:'conflict',l:'❤️ Xung đột',bar:'bar-conflict',val:'val-conflict',bg:'#fee2e2',bd:'#fca5a5',tc:'#991b1b'},
    {k:'comm',l:'💙 Giao tiếp',bar:'bar-comm',val:'val-comm',bg:'#cffafe',bd:'#67e8f9',tc:'#164e63'},
    {k:'emotion',l:'🧡 Cảm xúc',bar:'bar-emotion',val:'val-emotion',bg:'#fef3c7',bd:'#fcd34d',tc:'#92400e'}
  ];

  const bc=state.bc.length?`<div class="breadcrumb">${state.bc.map((b,i)=>
    `<span class="bc-item">${b}</span>${i<state.bc.length-1?'<span class="bc-sep">›</span>':''}`).join('')}</div>`:'';

  let main='';
  if(isLeaf){
    main=`<div class="consequence fade-in">
      <div class="cons-badge">✦ Hậu quả xảy ra</div>
      <div class="cons-short">${node.result.short}</div>
      <div class="cons-long">${node.result.long}</div>
    </div>
    <div class="nav-btns">
      ${state.si<SCENARIOS.length-1
        ?`<button class="btn-next" onclick="nextScene()">Tình huống tiếp theo →</button>`
        :`<button class="btn-next" onclick="showResult()">Xem kết quả của bạn ✦</button>`}
      <button class="btn-back" onclick="backScene()">↩ Thử lại</button>
    </div>`;
  } else if(hasChoices){
    main=`<div class="q-label">${state.bc.length===0?'Bạn sẽ làm gì?':(node.desc||'Điều gì xảy ra?')}</div>
    <div class="choices-list">
      ${node.choices.map(c=>`
        <button class="choice-btn" onclick='pick(${JSON.stringify(c)})'>
          <div class="choice-row">
            <div class="choice-id">${c.id}</div>
            <div class="choice-text">${c.text}</div>
          </div>
          ${c.effect?`<div class="etags">${etags(c.effect)}</div>`:''}</button>`).join('')}
    </div>`;
  }

  return`
  <div class="progress-wrap fade-in">
    <div class="progress-meta">
      <span class="progress-label">TIẾN ĐỘ</span>
      <span class="progress-frac">Tình huống ${state.si+1} / ${SCENARIOS.length}</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${prog}%"></div></div>
  </div>
  <div class="scores-panel fade-in">
    <div class="scores-title">Chỉ số tâm lý của bạn</div>
    <div class="score-grid">
      ${scoreBoxes.map(sc=>`
        <div class="score-box" style="background:${sc.bg};border-color:${sc.bd}">
          <div class="score-head">
            <span class="score-name" style="color:${sc.tc}">${sc.l}</span>
            <span class="score-num" style="color:${sc.tc}">${state.scores[sc.k]>0?'+':''}${state.scores[sc.k]}</span>
          </div>
          <div class="score-bar-wrap">
            <div class="score-bar-inner ${sc.bar}" style="width:${pct(state.scores[sc.k])}%"></div>
          </div>
        </div>`).join('')}
    </div>
  </div>
  <div class="scene-card fade-in">
    <div class="scene-top">
      <div class="scene-emoji">${s.icon}</div>
      <div>
        <div class="scene-num">Tình huống ${state.si+1}</div>
        <div class="scene-title">${s.title}</div>
      </div>
    </div>
    <div class="scene-body">
      <div class="scene-desc">${s.desc}</div>
    </div>
  </div>
  ${bc}${main}`;
}

function resultHTML(){
  const r=persona();
  const {trust,conflict,comm,emotion}=state.scores;
  const rows=[
    {l:'💚 Niềm tin',v:trust,bar:'bar-trust',tc:'#065f46'},
    {l:'❤️ Xung đột',v:conflict,bar:'bar-conflict',tc:'#991b1b'},
    {l:'💙 Giao tiếp',v:comm,bar:'bar-comm',tc:'#164e63'},
    {l:'🧡 Cảm xúc',v:emotion,bar:'bar-emotion',tc:'#92400e'}
  ];
  return`<div class="result-card fade-in">
    <div class="result-header">
      <div class="result-icon">${r.icon}</div>
      <div class="result-type" style="background:${r.light};color:${r.color};border-color:${r.border}">Phong cách tình yêu của bạn</div>
      <div class="result-name">${r.name}</div>
    </div>
    <div class="result-desc">${r.desc}</div>
    <div class="traits-row">
      ${r.traits.map(t=>`<div class="trait-box"><div class="trait-emoji">${t.e}</div><div class="trait-text">${t.t}</div></div>`).join('')}
    </div>
    <div class="divider"></div>
    <div class="final-scores-title">Chỉ số tổng kết</div>
    ${rows.map(r=>`
      <div class="final-score-row">
        <span class="fsr-label">${r.l}</span>
        <div class="fsr-track"><div class="fsr-bar ${r.bar}" style="width:${pct(r.v)}%"></div></div>
        <span class="fsr-val" style="color:${r.tc}">${r.v>0?'+':''}${r.v}</span>
      </div>`).join('')}
    <div style="margin-top:1.5rem">
      <button class="btn-main" onclick="reset()">↩ Chơi lại từ đầu</button>
    </div>
  </div>`;
}

function startGame(){state={phase:'playing',si:0,node:null,scores:{trust:0,conflict:0,comm:0,emotion:0},bc:[]};render()}
function pick(c){fx(c.effect);state.bc.push(c.id);state.node=c.result?{result:c.result}:(c.next||null);render()}
function nextScene(){state.si++;state.node=null;state.bc=[];render()}
function backScene(){state.node=null;state.bc=[];render()}
function showResult(){state.phase='result';render()}
function reset(){state={phase:'start',si:0,node:null,scores:{trust:0,conflict:0,comm:0,emotion:0},bc:[]};render()}
render();
</script>
</body>
</html>
