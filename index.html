<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hành Trang Hôn Nhân</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:ital,wght@1,700&display=swap"
      rel="stylesheet" />
    <!-- Bổ sung Chart.js cho Phân hệ 3 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #f8f0ff;
        --purple: #8b5cf6;
        --purple-dark: #6d28d9;
        --purple-light: #ede9fe;
        --purple-mid: #c4b5fd;
        --pink: #ec4899;
        --pink-dark: #be185d;
        --pink-light: #fce7f3;
        --pink-mid: #f9a8d4;
        --cyan: #06b6d4;
        --cyan-light: #cffafe;
        --cyan-mid: #67e8f9;
        --green: #10b981;
        --green-light: #d1fae5;
        --green-mid: #6ee7b7;
        --orange: #f59e0b;
        --orange-light: #fef3c7;
        --orange-mid: #fcd34d;
        --red: #ef4444;
        --red-light: #fee2e2;
        --red-mid: #fca5a5;
        --text: #1e1b4b;
        --text2: #4c1d95;
        --text3: #a78bfa;
        --r: 14px;
        --r-lg: 22px;
        --r-xl: 32px;
        --shadow: 0 4px 24px rgba(139, 92, 246, 0.13);
        --shadow-lg: 0 8px 40px rgba(139, 92, 246, 0.18);
      }
      body {
        font-family: "Nunito", sans-serif;
        background: var(--bg);
        min-height: 100vh;
        color: var(--text);
        background-image:
          radial-gradient(circle at 15% 15%, #ede9fe 0%, transparent 45%),
          radial-gradient(circle at 85% 80%, #fce7f3 0%, transparent 45%),
          radial-gradient(circle at 50% 50%, #f0fdf4 0%, transparent 60%);
      }
      #app {
        max-width: 720px;
        margin: 0 auto;
        padding: 2rem 1.1rem 5rem;
      }

      /* ── TABS NAV (Mới) ── */
      .top-nav {
        display: flex;
        gap: 0.8rem;
        margin-bottom: 2rem;
        justify-content: center;
        background: rgba(255, 255, 255, 0.6);
        padding: 0.5rem;
        border-radius: 50px;
        box-shadow: 0 2px 10px rgba(139, 92, 246, 0.1);
        backdrop-filter: blur(10px);
      }
      .nav-tab-btn {
        flex: 1;
        padding: 0.75rem 1rem;
        border: none;
        border-radius: 50px;
        background: transparent;
        color: var(--purple-dark);
        font-family: "Nunito", sans-serif;
        font-size: 0.9rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.25s;
      }
      .nav-tab-btn.active {
        background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
        color: #fff;
        box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
      }

      /* ── HERO ── */
      .hero {
        text-align: center;
        padding: 1.5rem 0 2rem;
      }
      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        color: #fff;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 0.45rem 1.2rem;
        border-radius: 50px;
        margin-bottom: 1.4rem;
        box-shadow: 0 4px 16px rgba(236, 72, 153, 0.35);
      }
      .hero h1 {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 2.8rem;
        line-height: 1.1;
        margin-bottom: 0.9rem;
        background: linear-gradient(
          135deg,
          var(--purple-dark) 0%,
          var(--pink) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .hero p {
        color: #6d28d9;
        font-size: 0.97rem;
        line-height: 1.75;
        font-weight: 600;
        max-width: 480px;
        margin: 0 auto;
      }

      /* ── START CARD ── */
      .start-card {
        background: #fff;
        border-radius: var(--r-xl);
        padding: 2rem;
        box-shadow: var(--shadow-lg);
        border: 2px solid var(--purple-mid);
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.65rem;
        margin-bottom: 1.5rem;
      }
      .stat-box {
        background: linear-gradient(
          135deg,
          var(--purple-light),
          var(--pink-light)
        );
        border-radius: var(--r);
        padding: 0.9rem 0.5rem;
        text-align: center;
        border: 2px solid var(--purple-mid);
      }
      .stat-n {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 1.9rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 0.2rem;
      }
      .stat-l {
        font-size: 0.7rem;
        color: var(--purple);
        font-weight: 700;
        letter-spacing: 0.3px;
      }
      .indicators {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.6rem;
        margin-bottom: 1.6rem;
      }
      .ind-chip {
        display: flex;
        align-items: center;
        gap: 0.55rem;
        padding: 0.65rem 0.9rem;
        border-radius: 50px;
        font-size: 0.82rem;
        font-weight: 700;
        border: 2px solid;
      }

      /* ── MODULE SELECTOR ── */
      .module-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0.8rem;
        margin-bottom: 1.6rem;
      }
      .mod-card {
        border-radius: var(--r-lg);
        padding: 1rem 0.9rem;
        text-align: center;
        cursor: pointer;
        border: 2px solid;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
      }
      .mod-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(139, 92, 246, 0.2);
      }
      .mod-card.selected::after {
        content: "✓";
        position: absolute;
        top: 6px;
        right: 8px;
        font-size: 0.75rem;
        font-weight: 900;
        background: var(--purple);
        color: #fff;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 20px;
      }
      .mod-icon {
        font-size: 1.6rem;
        margin-bottom: 0.4rem;
      }
      .mod-name {
        font-size: 0.8rem;
        font-weight: 800;
        line-height: 1.3;
      }

      /* ── BTN ── */
      .btn-main {
        width: 100%;
        padding: 1.05rem;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
        color: #fff;
        font-family: "Nunito", sans-serif;
        font-size: 1.05rem;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 6px 24px rgba(139, 92, 246, 0.4);
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      .btn-main:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 32px rgba(139, 92, 246, 0.5);
      }
      .btn-main:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn-next {
        padding: 0.75rem 1.5rem;
        border: none;
        border-radius: 50px;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        color: #fff;
        font-family: "Nunito", sans-serif;
        font-size: 0.9rem;
        font-weight: 800;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(139, 92, 246, 0.35);
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      .btn-next:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 22px rgba(139, 92, 246, 0.45);
      }
      .btn-back {
        padding: 0.75rem 1.25rem;
        border-radius: 50px;
        background: #fff;
        color: var(--purple);
        font-family: "Nunito", sans-serif;
        font-size: 0.9rem;
        font-weight: 800;
        cursor: pointer;
        border: 2px solid var(--purple-mid);
        transition: all 0.15s;
      }
      .btn-back:hover {
        background: var(--purple-light);
        border-color: var(--purple);
      }

      /* ── PROGRESS ── */
      .progress-wrap {
        margin-bottom: 1.8rem;
      }
      .progress-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.55rem;
      }
      .progress-label {
        font-size: 0.78rem;
        font-weight: 800;
        color: var(--purple);
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }
      .progress-frac {
        background: var(--purple-light);
        color: var(--purple-dark);
        font-size: 0.78rem;
        font-weight: 800;
        padding: 0.2rem 0.65rem;
        border-radius: 20px;
      }
      .progress-track {
        background: #e9d5ff;
        border-radius: 50px;
        height: 10px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 50px;
        background: linear-gradient(90deg, var(--purple), var(--pink));
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ── SCORES PANEL ── */
      .scores-panel {
        background: #fff;
        border-radius: var(--r-lg);
        padding: 1.4rem 1.5rem;
        margin-bottom: 1.4rem;
        box-shadow: var(--shadow);
        border: 2px solid var(--purple-light);
      }
      .scores-title {
        font-size: 0.72rem;
        font-weight: 800;
        color: var(--text3);
        letter-spacing: 1.2px;
        text-transform: uppercase;
        margin-bottom: 1rem;
      }
      .score-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }
      .score-box {
        background: var(--bg);
        border-radius: var(--r);
        padding: 0.75rem 0.9rem;
        border: 2px solid;
      }
      .score-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
      }
      .score-name {
        font-size: 0.78rem;
        font-weight: 800;
      }
      .score-num {
        font-size: 0.88rem;
        font-weight: 900;
      }
      .score-bar-wrap {
        background: rgba(255, 255, 255, 0.7);
        border-radius: 50px;
        height: 7px;
        overflow: hidden;
      }
      .score-bar-inner {
        height: 100%;
        border-radius: 50px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ── SCENE CARD ── */
      .scene-card {
        background: #fff;
        border-radius: var(--r-lg);
        overflow: hidden;
        margin-bottom: 1.4rem;
        box-shadow: var(--shadow);
        border: 2px solid var(--purple-light);
      }
      .scene-top {
        padding: 1.4rem 1.6rem 1.2rem;
        background: linear-gradient(
          135deg,
          var(--purple-light) 0%,
          var(--pink-light) 100%
        );
        border-bottom: 2px solid var(--purple-mid);
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .scene-emoji {
        width: 56px;
        height: 56px;
        min-width: 56px;
        background: #fff;
        border-radius: var(--r);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.7rem;
        box-shadow: 0 2px 12px rgba(139, 92, 246, 0.2);
        border: 2px solid var(--purple-mid);
      }
      .scene-num {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        color: var(--purple);
        margin-bottom: 0.3rem;
      }
      .scene-title {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 1.3rem;
        color: var(--text);
        line-height: 1.2;
      }
      .scene-module-tag {
        display: inline-block;
        font-size: 0.7rem;
        font-weight: 800;
        padding: 0.18rem 0.6rem;
        border-radius: 20px;
        margin-top: 0.3rem;
      }
      .scene-body {
        padding: 1.2rem 1.6rem;
      }
      .scene-desc {
        font-size: 0.9rem;
        color: #4c1d95;
        line-height: 1.75;
        font-weight: 600;
        background: var(--purple-light);
        padding: 0.9rem 1.1rem;
        border-radius: var(--r);
        border-left: 4px solid var(--purple);
      }

      /* ── CHOICES ── */
      .q-label {
        text-align: center;
        font-size: 0.82rem;
        font-weight: 800;
        color: var(--purple);
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      .q-label::before,
      .q-label::after {
        content: "";
        flex: 1;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--purple-mid));
      }
      .q-label::after {
        background: linear-gradient(90deg, var(--purple-mid), transparent);
      }
      .choices-list {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }
      .choice-btn {
        background: #fff;
        border: 2px solid var(--purple-mid);
        border-radius: var(--r-lg);
        padding: 1.1rem 1.3rem;
        cursor: pointer;
        text-align: left;
        width: 100%;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }
      .choice-btn:hover {
        border-color: var(--purple);
        background: linear-gradient(
          135deg,
          var(--purple-light) 0%,
          var(--pink-light) 100%
        );
        transform: translateY(-3px) scale(1.01);
        box-shadow: 0 8px 28px rgba(139, 92, 246, 0.22);
      }
      .choice-row {
        display: flex;
        align-items: flex-start;
        gap: 0.85rem;
      }
      .choice-id {
        min-width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        color: #fff;
        font-size: 0.88rem;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 3px 10px rgba(139, 92, 246, 0.35);
        flex-shrink: 0;
      }
      .choice-text {
        font-size: 0.94rem;
        color: var(--text);
        font-weight: 700;
        line-height: 1.5;
        padding-top: 0.1rem;
      }
      .etags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
      }
      .etag {
        font-size: 0.71rem;
        font-weight: 800;
        padding: 0.22rem 0.65rem;
        border-radius: 50px;
        border: 2px solid;
      }
      .et-trust {
        background: var(--green-light);
        color: #065f46;
        border-color: var(--green-mid);
      }
      .et-conflict {
        background: var(--red-light);
        color: #991b1b;
        border-color: var(--red-mid);
      }
      .et-comm {
        background: var(--cyan-light);
        color: #164e63;
        border-color: var(--cyan-mid);
      }
      .et-emotion {
        background: var(--orange-light);
        color: #92400e;
        border-color: var(--orange-mid);
      }

      /* ── CONSEQUENCE ── */
      .consequence {
        margin-top: 1.1rem;
        background: linear-gradient(135deg, #fdf4ff 0%, #fce7f3 100%);
        border: 2px solid var(--pink-mid);
        border-radius: var(--r-lg);
        padding: 1.4rem 1.6rem;
      }
      .cons-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        background: linear-gradient(135deg, var(--pink), var(--purple));
        color: #fff;
        font-size: 0.7rem;
        font-weight: 800;
        padding: 0.3rem 0.9rem;
        border-radius: 50px;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 0.85rem;
        box-shadow: 0 3px 12px rgba(236, 72, 153, 0.3);
      }
      .cons-short {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 1.2rem;
        color: var(--text);
        margin-bottom: 0.7rem;
        line-height: 1.3;
      }
      .cons-long {
        font-size: 0.88rem;
        color: #4c1d95;
        font-weight: 600;
        line-height: 1.75;
        background: rgba(255, 255, 255, 0.8);
        padding: 0.85rem 1.05rem;
        border-radius: var(--r);
        border-left: 4px solid var(--pink);
      }

      /* ── INSIGHT BOX ── */
      .insight-box {
        margin-top: 0.85rem;
        background: linear-gradient(135deg, #f0fdf4, #d1fae5);
        border: 2px solid var(--green-mid);
        border-radius: var(--r);
        padding: 0.85rem 1rem;
      }
      .insight-title {
        font-size: 0.7rem;
        font-weight: 800;
        color: #065f46;
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: 0.4rem;
      }
      .insight-text {
        font-size: 0.84rem;
        color: #064e3b;
        font-weight: 600;
        line-height: 1.65;
      }

      /* ── DIARY ── */
      .diary-wrap {
        background: #fff;
        border-radius: var(--r-lg);
        padding: 1.3rem 1.5rem;
        margin-bottom: 1.4rem;
        box-shadow: var(--shadow);
        border: 2px solid #fcd34d;
      }
      .diary-title {
        font-size: 0.72rem;
        font-weight: 800;
        color: #92400e;
        letter-spacing: 1.2px;
        text-transform: uppercase;
        margin-bottom: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .diary-entry {
        display: flex;
        align-items: flex-start;
        gap: 0.7rem;
        padding: 0.6rem 0;
        border-bottom: 1px dashed #fcd34d;
      }
      .diary-entry:last-child {
        border-bottom: none;
      }
      .diary-num {
        min-width: 24px;
        height: 24px;
        background: linear-gradient(135deg, var(--orange), #f97316);
        color: #fff;
        border-radius: 50%;
        font-size: 0.72rem;
        font-weight: 900;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .diary-text {
        font-size: 0.82rem;
        color: #78350f;
        font-weight: 600;
        line-height: 1.55;
      }
      .diary-tag {
        font-size: 0.7rem;
        font-weight: 800;
        padding: 0.15rem 0.5rem;
        border-radius: 10px;
        margin-left: 0.4rem;
        background: var(--orange-light);
        color: #92400e;
        border: 1px solid var(--orange-mid);
      }

      /* ── NAV ── */
      .nav-btns {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.2rem;
        flex-wrap: wrap;
      }
      .breadcrumb {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .bc-item {
        font-size: 0.74rem;
        color: #fff;
        background: linear-gradient(135deg, var(--purple), var(--pink));
        padding: 0.25rem 0.7rem;
        border-radius: 20px;
        font-weight: 800;
        box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
      }
      .bc-sep {
        color: var(--text3);
        font-size: 0.8rem;
      }

      /* ── RESULT ── */
      .result-card {
        background: #fff;
        border-radius: var(--r-xl);
        padding: 2rem;
        box-shadow: var(--shadow-lg);
        border: 2px solid var(--purple-mid);
      }
      .result-header {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .result-icon {
        font-size: 3.5rem;
        margin-bottom: 0.6rem;
        filter: drop-shadow(0 4px 12px rgba(139, 92, 246, 0.3));
      }
      .result-type {
        display: inline-block;
        padding: 0.4rem 1.3rem;
        border-radius: 50px;
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.5px;
        margin-bottom: 1rem;
        border: 2px solid;
      }
      .result-name {
        font-family: "Fraunces", serif;
        font-style: italic;
        font-size: 1.9rem;
        color: var(--text);
        margin-bottom: 0.5rem;
        line-height: 1.2;
      }
      .result-desc {
        font-size: 0.9rem;
        color: #4c1d95;
        font-weight: 600;
        line-height: 1.75;
        background: var(--purple-light);
        padding: 1rem 1.2rem;
        border-radius: var(--r);
        border-left: 4px solid var(--purple);
        margin-bottom: 1.4rem;
        text-align: left;
      }
      .traits-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.65rem;
        margin-bottom: 1.4rem;
      }
      .trait-box {
        background: linear-gradient(
          135deg,
          var(--purple-light),
          var(--pink-light)
        );
        border-radius: var(--r);
        padding: 0.85rem 0.8rem;
        border: 2px solid var(--purple-mid);
        text-align: center;

    </div>
    <div class="scene-body"><div class="scene-desc" style="border-left-color:${mc.bd}">${s.desc}</div></div>
  </div>
  ${diaryHTML}${bc}${main}`;
      }

      // ── ASSISTANT SCREEN (PHÂN HỆ 2) ──
      function assistantHTML() {
        return `
        <div class="assistant-section fade-in">
          <div class="assistant-title">💰 Quản lý Tài chính Cặp đôi</div>
          <div class="finance-card">
            <p style="font-size:0.85rem; color:var(--green); font-weight:700; margin-bottom:1.5rem; line-height:1.5">
              Công cụ mô phỏng để thống nhất quỹ chung và dự trù áp lực kinh tế hàng tháng.
            </p>
            <div class="input-group">
              <label>Thu nhập Người A (Triệu VNĐ)</label>
              <input type="number" id="incA" value="15" oninput="calcFinance()">
            </div>
            <div class="input-group">
              <label>Thu nhập Người B (Triệu VNĐ)</label>
              <input type="number" id="incB" value="12" oninput="calcFinance()">
            </div>
            <div class="input-group">
              <label>Tỷ lệ đóng góp quỹ chung (%)</label>
              <input type="number" id="pctJoint" value="60" oninput="calcFinance()">
            </div>
            <div class="input-group">
              <label>Dự kiến chi phí sinh hoạt chung (Triệu VNĐ)</label>
              <input type="number" id="expense" value="15" oninput="calcFinance()">
            </div>
            <div id="finResult"></div>
          </div>
        </div>

        <div class="assistant-section fade-in" style="animation-delay: 0.1s">
          <div class="assistant-title">🧘 Biểu đồ Cảm xúc & Mindfulness</div>
          <div class="emotion-card">
            <p style="font-size:0.85rem; color:#b45309; font-weight:700; margin-bottom:1rem; line-height:1.5">
              Bạn đang cảm thấy mức độ căng thẳng hiện tại như thế nào? (1 - Bình yên, 10 - Quá sức chịu đựng)
            </p>
            <div class="slider-wrap">
              <span style="font-size:1.5rem; font-weight:900; color:var(--orange-dark)" id="emoVal">5</span> / 10
              <input type="range" min="1" max="10" value="5" class="emo-slider" id="emoSlider" oninput="checkEmotion(this.value)">
            </div>
            <div id="mindfulnessBox" class="mindfulness-box"></div>
          </div>
        </div>
        `;
      }

      function calcFinance() {
        const incA = parseFloat(document.getElementById("incA").value) || 0;
        const incB = parseFloat(document.getElementById("incB").value) || 0;
        const pctJoint =
          parseFloat(document.getElementById("pctJoint").value) || 0;
        const expense =
          parseFloat(document.getElementById("expense").value) || 0;

        const jointFund = ((incA + incB) * pctJoint) / 100;
        const remainA = incA - (incA * pctJoint) / 100;
        const remainB = incB - (incB * pctJoint) / 100;
        const balance = jointFund - expense;

        let statusHTML =
          balance >= 0 ?
            `<div style="color:#065f46; font-weight:800; font-size:0.9rem">✅ Quỹ chung an toàn: Dư +${balance.toFixed(1)} triệu (có thể tích lũy)</div>`
          : `<div style="color:#991b1b; font-weight:800; font-size:0.9rem">⚠️ Báo động đỏ: Quỹ chung đang thâm hụt ${Math.abs(balance).toFixed(1)} triệu! Cần điều chỉnh chi tiêu hoặc tăng % đóng góp.</div>`;

        document.getElementById("finResult").innerHTML = `
            <div style="margin-top:1.5rem; padding:1.2rem; background:var(--green-light); border-radius:var(--r); border:2px dashed var(--green-mid)">
                <p style="margin-bottom:0.4rem; color:#064e3b; font-size:0.9rem"><strong>Tổng quỹ chung (${pctJoint}%):</strong> ${jointFund.toFixed(1)} triệu</p>
                <p style="margin-bottom:0.4rem; color:#064e3b; font-size:0.9rem"><strong>Quỹ riêng Người A:</strong> ${remainA.toFixed(1)} triệu</p>
                <p style="margin-bottom:0.4rem; color:#064e3b; font-size:0.9rem"><strong>Quỹ riêng Người B:</strong> ${remainB.toFixed(1)} triệu</p>
                <hr style="border:0; border-top:1px solid var(--green-mid); margin: 0.8rem 0">
                ${statusHTML}
            </div>
        `;
      }

      function checkEmotion(val) {
        const v = parseInt(val);
        document.getElementById("emoVal").textContent = v;
        const box = document.getElementById("mindfulnessBox");

        if (v >= 7) {
          box.innerHTML = `
                <div style="font-weight:800; color:#991b1b; margin-bottom:0.5rem; font-size:0.9rem">Cảnh báo: Căng thẳng cao! 🛑</div>
                <p style="font-size:0.85rem; line-height:1.6; color:#7f1d1d; font-weight:600">
                1. Dừng lại: Hít vào 4s, giữ 7s, thở ra 8s.<br>
                2. Giao tiếp phi bạo lực: "Khi em/anh thấy... em/anh cảm thấy... vì em/anh cần... Vậy nên, mình có thể..."<br>
                3. Tuyệt đối không ra quyết định lớn lúc này!
                </p>
            `;
          box.style.background = "var(--red-light)";
          box.style.borderColor = "var(--red)";
        } else if (v >= 4) {
          box.innerHTML = `
                <div style="font-weight:800; color:#92400e; margin-bottom:0.5rem; font-size:0.9rem">Bạn đang hơi mệt mỏi ☕</div>
                <p style="font-size:0.85rem; line-height:1.6; color:#78350f; font-weight:600">
                Hãy cho mình một khoảng nghỉ 15 phút. Nghe một bản nhạc, uống ly nước và chia sẻ nhẹ nhàng với người kia cảm giác của bạn lúc này.
                </p>
            `;
          box.style.background = "var(--orange-light)";
          box.style.borderColor = "var(--orange)";
        } else {
          box.innerHTML = `
                <div style="font-weight:800; color:#065f46; margin-bottom:0.5rem; font-size:0.9rem">Tuyệt vời! Tâm lý đang ổn định 🌿</div>
                <p style="font-size:0.85rem; line-height:1.6; color:#064e3b; font-weight:600">
                Trạng thái này rất tốt để trò chuyện về những kế hoạch tương lai hoặc đơn giản là dành thời gian chất lượng cho nhau.
                </p>
            `;
          box.style.background = "var(--green-light)";
          box.style.borderColor = "var(--green-mid)";
        }
      }

      // ── RESULT SCREEN (PHÂN HỆ 3) ──
      function resultHTML() {
        const r = persona();
        const { trust, conflict, comm, emotion } = state.scores;
        const rows = [
          { l: "💚 Niềm tin", v: trust, bar: "#10b981", tc: "#065f46" },
          { l: "❤️ Xung đột", v: conflict, bar: "#ef4444", tc: "#991b1b" },
          { l: "💙 Giao tiếp", v: comm, bar: "#06b6d4", tc: "#164e63" },
          { l: "🧡 Cảm xúc", v: emotion, bar: "#f59e0b", tc: "#92400e" },
        ];

        const insightPanels = Object.entries(INSIGHTS)
          .map(([k, v]) => {
            const val = state.scores[k] || 0;
            const txt = val >= 0 ? v.pos : v.neg;
            const icons = {
              trust: "💚",
              conflict: "❤️",
              comm: "💙",
              emotion: "🧡",
            };
            return `<div class="advice-item"><span class="advice-dot">${icons[k]}</span><span class="advice-text">${txt}</span></div>`;
          })
          .join("");

        const tlDots = {
          emotion: "#ef4444",
          finance: "#f59e0b",
          family: "#10b981",
        };
        const timelineHTML = state.diary
          .map((d, i) => {
            const dot = tlDots[d.module] || "#8b5cf6";
            return `<div class="tl-item"><div class="tl-dot" style="background:${dot};border-color:${dot}40"></div><div class="tl-content"><div class="tl-scene">${i + 1}. ${d.scene}</div><div class="tl-choice">${d.choice}</div><div class="tl-outcome">${d.outcome}</div></div></div>`;
          })
          .join("");

        const summaryText = `Hành trang hôn nhân của tôi:\n• Phong cách: ${r.name}\n• Niềm tin: ${trust > 0 ? "+" : ""}${trust} | Giao tiếp: ${comm > 0 ? "+" : ""}${comm}\n• Xung đột: ${conflict > 0 ? "+" : ""}${conflict} | Cảm xúc: ${emotion > 0 ? "+" : ""}${emotion}`;

        return `<div class="result-card fade-in">
    <div class="result-header">
      <div class="result-icon">${r.icon}</div>
      <div class="result-type" style="background:${r.light};color:${r.color};border-color:${r.border}">Phong cách tình yêu của bạn</div>
      <div class="result-name">${r.name}</div>
    </div>
    <div class="result-desc">${r.desc}</div>
    <div class="traits-row">
      ${r.traits.map((t) => `<div class="trait-box"><div class="trait-emoji">${t.e}</div><div class="trait-text">${t.t}</div></div>`).join("")}
    </div>

    <!-- Phân hệ 3: Biểu đồ trực quan Chart.js -->
    <div class="advice-panel" style="background:#fff; border-color:var(--purple-mid); text-align:center; padding-bottom: 2rem;">
      <div class="advice-title" style="color:var(--purple); margin-bottom:1.5rem">🕸️ Phân tích Kỹ năng Đa chiều</div>
      <div style="position: relative; width: 100%; max-width: 320px; margin: 0 auto;">
         <canvas id="radarChart"></canvas>
      </div>
    </div>

    <div class="advice-panel">
      <div class="advice-title">🎯 Phân tích chỉ số của bạn</div>
      ${insightPanels}
    </div>

    <div class="advice-panel" style="background:linear-gradient(135deg,var(--purple-light),#fce7f3);border-color:var(--purple-mid)">
      <div class="advice-title" style="color:var(--purple-dark)">✨ Lời khuyên cho hành trình sắp tới</div>
      ${r.advice.map((a) => `<div class="advice-item"><span class="advice-dot">→</span><span class="advice-text" style="color:var(--text2)">${a}</span></div>`).join("")}
    </div>

    <div class="divider"></div>
    <div class="final-scores-title">Chỉ số tổng kết</div>
    ${rows.map((rw) => `<div class="final-score-row"><span class="fsr-label">${rw.l}</span><div class="fsr-track"><div class="fsr-bar" style="width:${pct(rw.v)}%;background:${rw.bar}"></div></div><span class="fsr-val" style="color:${rw.tc}">${rw.v > 0 ? "+" : ""}${rw.v}</span></div>`).join("")}

    ${state.diary.length ? `<div class="divider"></div><div class="final-scores-title">🗺️ Hành trình bạn đã đi qua</div><div class="timeline">${timelineHTML}</div>` : ""}

    <div class="divider"></div>
    <div style="margin-bottom:1rem">
      <button class="btn-main" onclick="reset()">↩ Chơi lại từ đầu</button>
    </div>
    <div class="share-row">
      <button class="btn-share btn-share-copy" onclick="copyResult('${encodeURIComponent(summaryText)}')">📋 Sao chép kết quả</button>
      <button class="btn-share btn-share-replay" onclick="replayDifferent()">🔄 Thử chọn khác</button>
    </div>
  </div>`;
      }

      // Xử lý vẽ biểu đồ Radar (Phân hệ 3)
      function drawChart() {
        const ctx = document.getElementById("radarChart");
        if (!ctx) return;
        if (radarChartObj) radarChartObj.destroy();

        const { trust, conflict, comm, emotion } = state.scores;
        // Điểm xung đột cao (giá trị dương) là điều xấu trong game.
        // Để vẽ biểu đồ (cao là tốt), ta đảo ngược lại (càng ít xung đột = kỹ năng quản trị càng cao).
        const conflictMng = -conflict;

        const dataVals = [
          pct(trust),
          pct(conflictMng),
          pct(comm),
          pct(emotion),
        ];

        radarChartObj = new Chart(ctx, {
          type: "radar",
          data: {
            labels: ["Niềm tin", "Quản trị xung đột", "Giao tiếp", "Cảm xúc"],
            datasets: [
              {
                label: "Năng lực (%)",
                data: dataVals,
                backgroundColor: "rgba(139, 92, 246, 0.3)",
                borderColor: "rgba(139, 92, 246, 1)",
                pointBackgroundColor: "rgba(236, 72, 153, 1)",
                pointBorderColor: "#fff",
                pointHoverBackgroundColor: "#fff",
                pointHoverBorderColor: "rgba(236, 72, 153, 1)",
                borderWidth: 2,
                pointRadius: 4,
              },
            ],
          },
          options: {
            scales: {
              r: {
                angleLines: { color: "rgba(139, 92, 246, 0.2)" },
                grid: { color: "rgba(139, 92, 246, 0.2)" },
                pointLabels: {
                  font: { size: 11, family: "Nunito", weight: "800" },
                  color: "#4c1d95",
                },
                ticks: { display: false, min: 0, max: 100, stepSize: 20 },
              },
            },
            plugins: { legend: { display: false } },
            maintainAspectRatio: false,
          },
        });
      }

      // ── ACTIONS ──
      function startGame() {
        if (state.selectedModules.length === 0) return;
        state.filteredScenarios = SCENARIOS.filter((s) =>
          state.selectedModules.includes(s.module),
        );
        state.phase = "playing";
        state.si = 0;
        state.node = null;
        state.scores = { trust: 0, conflict: 0, comm: 0, emotion: 0 };
        state.bc = [];
        state.diary = [];
        render();
      }

      function pick(c) {
        fx(c.effect);
        state.bc.push(c.id);
        state.node = c.result ? { result: c.result } : c.next || null;
        render();
      }

      function nextScene() {
        const s = state.filteredScenarios[state.si];
        const lastResult = state.node?.result;
        if (lastResult)
          state.diary.push({
            scene: s.title,
            choice: state.bc.join(" → "),
            outcome: lastResult.short,
            module: s.module,
          });
        state.si++;
        state.node = null;
        state.bc = [];
        render();
      }

      function backScene() {
        state.node = null;
        state.bc = [];
        render();
      }

      function showResult() {
        const s = state.filteredScenarios[state.si];
        const lastResult = state.node?.result;
        if (lastResult)
          state.diary.push({
            scene: s.title,
            choice: state.bc.join(" → "),
            outcome: lastResult.short,
            module: s.module,
          });
        state.phase = "result";
        render();
      }

      function reset() {
        state = {
          view: "main",
          phase: "start",
          si: 0,
          node: null,
          scores: { trust: 0, conflict: 0, comm: 0, emotion: 0 },
          bc: [],
          diary: [],
          selectedModules: ["emotion", "finance", "family"],
          filteredScenarios: [],
        };
        render();
      }

      function replayDifferent() {
        state.phase = "playing";
        state.si = 0;
        state.node = null;
        state.scores = { trust: 0, conflict: 0, comm: 0, emotion: 0 };
        state.bc = [];
        state.diary = [];
        render();
      }

      function copyResult(enc) {
        const txt = decodeURIComponent(enc);
        navigator.clipboard
          .writeText(txt)
          .then(() => toast("✅ Đã sao chép kết quả!"))
          .catch(() => toast("Không thể sao chép"));
      }

      render();
    </script>
  </body>
</html>
